[general]
import = [
  "~/.config/alacritty/theme.toml",
  "~/.config/alacritty/font.toml",
  "~/.config/alacritty/font-size.toml",
  "~/.local/share/omakub/defaults/alacritty.toml"
]

[env]
TERM = "xterm-256color"

#[terminal.shell]
#program = "zellij"

[window]
padding.x = 16
padding.y = 14
#decorations = "None"
opacity = 0.98
option_as_alt = "Both"

[colors.primary]
# background = "#181818"
background = "#050726"
# background = "#ffffff"

[keyboard]
bindings = [
  { key = "F11", action = "ToggleFullscreen" },
  { key = "Right", mods =  "Alt", chars = "\u001BF" },
  { key = "Left", mods = "Alt", chars = "\u001BB" }
]
